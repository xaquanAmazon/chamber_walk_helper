<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="popup">

    <div class="popup-header">
      <h3>Chamber Walk Helper</h3>
      <a href="settings.html" id="openSettings">&#9881; Settings</a>
    </div>

    <div id="status" class="status-msg"></div>

    <!-- Alias — loaded from storage, locked. Edit opens Settings. -->
    <div class="input-group" style="margin-bottom:10px;">
      <label>Amazon Alias <span class="required">*</span></label>
      <div class="flex-row">
        <input type="text" id="amz-alias" placeholder="Set alias in Settings" class="flex-1" />
        <button id="alias-edit-btn" class="btn-fixed" style="display:none;">Edit</button>
      </div>
      <div id="alias-required" class="status-msg error" style="display:none;">
        Alias is required before logging.
      </div>
    </div>

    <!-- Chamber dropdown -->
    <div class="input-group" style="margin-bottom: 14px;">
      <label>Select Chamber</label>
      <select id="chamber-dropdown">
        <option value="">-- Select Chamber --</option>
      </select>
    </div>

    <!-- Audit form -->
    <div id="form" style="display:none;">

      <!-- Hidden fields (used in payload + copy only) -->
      <span id="f-time"         style="display:none;"></span>
      <span id="f-chamberGroup" style="display:none;"></span>

      <!-- Read-only card data -->
      <div class="card-fields">
        <div class="card-field"><span class="card-field-label">Chamber</span><span id="f-chamber" class="card-field-value"></span></div>
        <div class="card-field"><span class="card-field-label">Work Request ID</span><span id="f-wrId" class="card-field-value text-mono"></span></div>
        <div class="card-field"><span class="card-field-label">LRU Being Tested</span><span id="f-lru" class="card-field-value"></span></div>
        <div class="card-field"><span class="card-field-label">Chamber Status</span><span id="f-chamberStatus" class="card-field-value"></span></div>
        <div class="card-field"><span class="card-field-label">WORM Status</span><span id="f-wormStatus" class="card-field-value"></span></div>
        <div class="card-field"><span class="card-field-label">Est. Completion</span><span id="f-completion" class="card-field-value"></span></div>
      </div>

      <!-- User inputs -->
      <div class="input-group">
        <label>KTE Status</label>
        <select id="f-kte"></select>
      </div>

      <div class="input-group">
        <label>Temp Trend Matches Profile</label>
        <select id="f-temp"></select>
      </div>

      <div class="input-group">
        <label>Issue Found</label>
        <select id="f-issue"></select>
      </div>

      <div class="input-group">
        <label>
          Issue Details / SIM Link
          <span id="issue-detail-required" class="required" style="display:none;">*</span>
        </label>
        <textarea id="f-issueDetail" style="height:50px;"></textarea>
      </div>

      <div class="input-group">
        <label>Other Comments</label>
        <textarea id="f-comments" style="height:50px;"></textarea>
      </div>

      <!-- Actions -->
      <div class="controls">
        <button id="copy-btn" class="btn-primary">Copy</button>
        <button id="log-btn"  class="btn-success">Log to Record</button>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="log-and-copy" />
        Log and Copy
      </label>

      <div id="output" class="output-box"></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
